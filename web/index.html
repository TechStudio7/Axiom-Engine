<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Axiom Engine Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <img src="../assets/AxiomLogo.png" alt="Axiom Engine" class="logo">
            <h1>Axiom Web</h1>
        </header>

        <canvas id="game" width="960" height="540" aria-label="Axiom web game canvas"></canvas>

        <footer class="status">
            <span id="fps">0 FPS</span>
            <span>Arrow keys or WASD</span>
        </footer>
    </main>

    <script src="game.js"></script>
</body>
</html>
